
{% extends "base.html" %}
{% load static %}

{% block css %}
    <link href="{% static 'plugins/datatables/responsive.bootstrap5.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'plugins/select2/select2-bootstrap4.css' %}" rel="stylesheet"/>

    <link href="{% static 'plugins/sweetalert2/sweetalert2.min.css' %}" rel="stylesheet" type="text/css">
{% endblock %}

{% block content %}
    <div class="wrapper wrapper-content animated fadeInRight">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h2>{{ titulo }}</h2>
                    </div>
                    <div class="ibox-content">
                        <h4>Alumno/a: {{ protocolo.alumno.Nombre }}</h4>
                        <br/>
                        <form  method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="input-group">
                                <div class="custom-file">
                                    {{ form.InformePDF }}
                                    <label class="custom-file-label" for="id_InformePDF">Elige el archivo con el informe</label>
                                </div>
                            </div>
                            <br/>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </form>
{% endblock %}

{% block js %}
    <script src="{% static 'plugins/select2/select2.min.js' %}"></script>
    <script src="{% static 'plugins/sweetalert2/sweetalert2.min.js' %}"></script>

    <script>
        $(document).ready(function() {
            // bsCustomFileInput.init();

            {#$(".select2_CursoAcademico").select2({#}
            {#    theme: 'bootstrap4',#}
            {#    placeholder: "Selecciona un curso academico",#}
            {#    allowClear: false#}
            {#});#}
        }
    </script>
{% endblock %}
